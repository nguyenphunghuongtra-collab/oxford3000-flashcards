<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Learning Vocab with Ms. Tra</title>
   <link rel="stylesheet" href="style.css?v=20260610">
    <!-- PWA -->
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#4f46e5" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="VocabApp" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar" aria-label="Vocabulary controls">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true">HT</span>
          <div>
            <h1>Learning Vocab with Ms. Tra</h1>
            <p class="brand-subtitle">Oxford • Cambridge • IELTS</p>
            <p id="card-count">Loading...</p>
          </div>
        </div>

        <button class="icon-button theme-toggle" id="theme-toggle" type="button" aria-label="Toggle dark mode">
          <span class="sun" aria-hidden="true"></span>
          <span class="moon" aria-hidden="true"></span>
        </button>
      </header>

      <section class="controls" aria-label="Search and filter">
        <label class="search-field">
          <span class="search-icon" aria-hidden="true"></span>
          <input id="search-input" type="search" placeholder="Search words, meanings, examples" autocomplete="off" />
        </label>

        <div class="deck-selector">
          <select id="deck-select">
            <option value="oxford3000">Oxford 3000</option>
            <option value="oxford-5000">Oxford 5000</option>
             <option value="cambridge-ielts-reading-14">
               IELTS Reading 14
              <option value="cambridge-ielts-reading-15">
                IELTS Reading 15
              <option value="cambridge-ielts-reading-16">
                IELTS Reading 16
                 <option value="cambridge-ielts-reading-17">
                IELTS Reading 17
             </option>
          </select>
        </div>

        <div class="level-tabs" id="level-tabs" role="tablist" aria-label="CEFR level">
          <button class="level-tab active" type="button" data-level="All">All</button>
          <button class="level-tab" type="button" data-level="A1">A1</button>
          <button class="level-tab" type="button" data-level="A2">A2</button>
          <button class="level-tab" type="button" data-level="B1">B1</button>
          <button class="level-tab" type="button" data-level="B2">B2</button>
          <button class="level-tab" type="button" data-level="C1">C1</button>
          <button class="level-tab" type="button" data-level="IELTS">IELTS</button>
        </div>

        <button class="favorite-filter" id="favorite-filter-button" type="button" aria-pressed="false">
          <span class="star-icon" aria-hidden="true"></span>
          Favorites
          <span id="favorite-count">0</span>
        </button>

        <button class="difficult-filter" id="difficult-filter-button" type="button" aria-pressed="false">
          <span class="flag-icon" aria-hidden="true"></span>
          Difficult
          <span id="difficult-count">0</span>
        </button>
      </section>

      <section class="progress-dashboard" aria-label="Learning progress">
        <div class="progress-stat">
          <span class="progress-label">Learned</span>
          <strong id="learned-count">0</strong>
        </div>
        <div class="progress-stat">
          <span class="progress-label">Remaining</span>
          <strong id="remaining-count">0</strong>
        </div>
        <div class="progress-stat">
          <span class="progress-label">Percentage</span>
          <strong id="progress-percent">0%</strong>
        </div>
        <div class="progress-meter" role="progressbar" aria-label="Learning progress bar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
          <span id="progress-fill"></span>
        </div>
      </section>

      <section class="session-panel" aria-label="Study session">
       <div class="daily-streak-card">
    <strong id="daily-streak">🔥 0 Day Streak</strong>
</div>

<div class="session-header">
          <div>
            <h2>Study Session</h2>
            <p id="session-target-status">0 / 20 completed</p>
          </div>
          <button class="reset-session-button" id="reset-session-button" type="button">Reset Session</button>
        </div>

        <div class="target-options" id="target-options" aria-label="Daily target">
          <button class="target-option" type="button" data-target="10">10</button>
          <button class="target-option active" type="button" data-target="20">20</button>
          <button class="target-option" type="button" data-target="50">50</button>
          <button class="target-option" type="button" data-target="100">100</button>
        </div>

        <div class="session-summary">
          <div class="session-stat">
            <span class="progress-label">Total reviewed</span>
            <strong id="session-reviewed-count">0</strong>
          </div>
          <div class="session-stat">
            <span class="progress-label">Learned</span>
            <strong id="session-learned-count">0</strong>
          </div>
          <div class="session-stat">
            <span class="progress-label">Difficult</span>
            <strong id="session-difficult-count">0</strong>
          </div>
        </div>

        <div class="session-meter" role="progressbar" aria-label="Daily target progress" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
          <span id="session-progress-fill"></span>
        </div>
      </section>

      <section class="study-area" aria-live="polite">
        <div class="flashcard" id="flashcard" role="button" tabindex="0" aria-label="Flip card">
         <span class="card-face card-front">
            <button class="favorite-button" id="favorite-button" type="button" aria-label="Add to favorites">
              <span class="star-icon" aria-hidden="true"></span>
            </button>
            <span class="level-pill" id="front-level"></span>
            <span class="word-row">
              <span class="word" id="front-word"></span>
            </span>
            <span class="ipa-row">
              <span class="ipa" id="front-ipa"></span>
              <button class="speaker-button" id="speaker-button" type="button" aria-label="Play pronunciation">
                <span class="speaker-icon" aria-hidden="true"></span>
              </button>
            </span>
            <span class="audio-status" id="audio-status" aria-live="polite"></span>
          </span>
          <span class="card-face card-back">
            <span class="back-grid">
              <span class="field">
                <span class="field-label">Meaning</span>
                <span class="field-value" id="back-meaning"></span>
              </span>
              <span class="field">
                <span class="field-label">Definition</span>
                <span class="field-value" id="back-definition"></span>
              </span>
              <span class="field">
                <span class="field-label">Example</span>
                <span class="field-value" id="back-example-en"></span>
              </span>
              <span class="field">
                <span class="field-label">Translation</span>
                <span class="field-value" id="back-example-vi"></span>
              </span>
            </span>
          </span>
        </div>

        <div class="empty-state" id="empty-state" hidden>
          <h2>No words found</h2>
          <p>Try another search or level.</p>
        </div>
      </section>
      <div id="quiz-area" hidden></div>
<footer class="nav-controls" aria-label="Card navigation">
  <button class="nav-button" id="prev-button" type="button">
    <span class="chevron left" aria-hidden="true"></span>
  </button>
  <button class="nav-button random" id="random-button" type="button">
    <span class="shuffle-icon" aria-hidden="true"></span>
    Random
  </button>
  <button class="nav-button difficult-toggle" id="difficult-button" type="button" aria-pressed="false">
    <span class="flag-icon" aria-hidden="true"></span>
    <span id="difficult-button-label">Difficult</span>
  </button>
  <button class="nav-button learned-toggle" id="learned-button" type="button" aria-pressed="false">
    <span class="check-icon" aria-hidden="true"></span>
    <span id="learned-button-label">Learned</span>
  </button>
  <button class="nav-button" id="next-button" type="button">
    <span class="chevron right" aria-hidden="true"></span>
  </button>
  <button class="nav-button quiz-toggle" id="quiz-toggle-button" type="button">⊞ Quiz</button>
</footer>
    </main>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then(reg => console.log('SW registered:', reg.scope))
        .catch(err => console.warn('SW failed:', err));
    });
  }
</script>
    <script src="app.js"></script>
  </body>
</html>
